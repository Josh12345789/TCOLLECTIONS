<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAPE CROCS - T Collections</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* General page styles */
        body {
            background-color: black;
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }

        /* Minecraft Style Title */
        h1 {
            font-family: 'Press Start 2P', cursive;
            color: rgb(92, 46, 199);
            /* Sized smaller because pixel fonts are naturally bulky */
            font-size: clamp(1.2rem, 5vw, 2rem); 
            line-height: 1.6;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0px rgba(255, 255, 255, 0.1);
        }

        /* Pricing text */
        .price {
            color: crimson;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        /* Instructions */
        .instruction {
            color: blueviolet;
            margin-bottom: 30px;
        }

        /* Blocky Minecraft-style button */
        .contact-btn {
            background-color: blueviolet;
            color: white;
            border: none;
            /* Border-bottom creates a "3D block" effect */
            border-bottom: 5px solid #4a1d8a; 
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px; /* Square edges */
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s;
        }

        .contact-btn:hover {
            background-color: #7a32cc;
        }

        .contact-btn:active {
            transform: translateY(3px);
            border-bottom: 2px solid #4a1d8a;
        }

        /* Image styling */
        img {
            max-width: 100%;
            height: auto;
            margin-top: 30px;
            border: 4px solid #333; /* Thicker border for a blocky feel */
            border-radius: 8px;
        }

        a {
            text-decoration: none; 
        }
    </style>
</head>
<body>

    <h1>BAPECROCS</h1>

    <p class="price">EACH PAIR IS GOING AT K220 FOR A PRE ORDER AND K550 AT RETAIL</p>
    
    <p class="instruction">Once you have chosen a pair, click the link below to purchase the product from the supplier.</p>
    
    <a href="https://wa.me/qr/QQAG6XSQE3UVB1?text=Hello!%20I%20am%20interested%20in%20ordering%20a%20pair%20of%20Bape%20Crocs.">
        <button class="contact-btn">CONTACT SUPPLIER</button>
    </a>

    <br>

    <img src="Bcrocs.jpg" alt="Bape Crocs Collection">

</body>
</html>
