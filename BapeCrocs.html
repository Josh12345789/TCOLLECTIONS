<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAPE CROCS - T Collections</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        body {
            /* COOL BACKGROUND: Dark Gray with a subtle Purple Grid */
            background-color: #0a0a0a;
            background-image: 
                linear-gradient(rgba(92, 46, 199, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(92, 46, 199, 0.1) 1px, transparent 1px);
            background-size: 30px 30px; /* Size of the grid squares */
            
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            color: rgb(150, 100, 255); /* Lighter purple to glow */
            font-size: clamp(1.2rem, 5vw, 2.5rem); 
            line-height: 1.6;
            margin-bottom: 20px;
            /* Glow effect */
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.8);
        }

        .price {
            color: #ff2e5f;
            font-weight: bold;
            font-size: 1.4rem;
            background: rgba(0, 0, 0, 0.6);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 4px;
            border: 1px solid crimson;
        }

        .instruction {
            color: #b388ff;
            margin-top: 20px;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .contact-btn {
            background-color: #6200ea;
            color: white;
            border: none;
            border-bottom: 5px solid #310075; 
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .contact-btn:hover {
            background-color: #7c4dff;
            transform: translateY(-2px);
        }

        .contact-btn:active {
            transform: translateY(3px);
            border-bottom: 2px solid #310075;
        }

        img {
            max-width: 100%;
            height: auto;
            margin-top: 40px;
            border: 6px solid #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        a { text-decoration: none; }
    </style>
</head>
<body>

    <h1>BAPE CROCS</h1>

    <p class="price">K220 PRE-ORDER | K550 RETAIL</p>
    
    <p class="instruction">Select your style and hit the button below to message us.</p>
    
    <a href="https://wa.me/qr/QQAG6XSQE3UVB1?text=Hello!%20I%20want%20to%20buy%20Bape%20Crocs.">
        <button class="contact-btn">CONTACT SUPPLIER</button>
    </a>

    <br>

    <img src="Bcrocs.jpg" alt="Bape Crocs Collection">

</body>
</html>
