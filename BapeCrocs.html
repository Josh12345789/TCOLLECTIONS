<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAPE</title>
    <style>
        /* General page styles */
        body {
            background-color: black;
            color: white; /* Default text color */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }

        /* Title styling */
        h1 {
            color: rgb(92, 46, 199);
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* Pricing text */
        .price {
            color: crimson;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Instructions */
        .instruction {
            color: blueviolet;
            margin-bottom: 20px;
        }

        /* Modern button styling */
        .contact-btn {
            background-color: blueviolet;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s;
        }

        .contact-btn:hover {
            transform: scale(1.05); /* Slight pop when hovering */
            background-color: #7a32cc;
        }

        /* Image styling */
        img {
            max-width: 100%;
            height: auto;
            margin-top: 30px;
            border: 2px solid #333;
            border-radius: 12px;
        }

        a {
            text-decoration: none; /* Removes underline from the link */
        }
    </style>
</head>
<body>

    <h1>BAPECROCS</h1>

    <p class="price">EACH PAIR IS GOING AT K220 FOR A PRE ORDER AND K550 AT RETAIL</p>
    
    <p class="instruction">Once you have chosen a pair, click the link below to purchase the product from the supplier.</p>
    
    <a href="https://wa.me/qr/QQAG6XSQE3UVB1">
        <button class="contact-btn">CONTACT SUPPLIER</button>
    </a>

    <br>

    <img src="Bcrocs.jpg" alt="Bape Crocs Collection">

</body>
</html>
