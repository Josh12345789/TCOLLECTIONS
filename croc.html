<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLASSIC CROCS</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            line-height: 1.6;
        }

        h1 {
            color: rgb(92, 46, 199);
            font-size: clamp(2rem, 10vw, 3.5rem);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .price-tag {
            color: crimson;
            font-weight: bold;
            font-size: 1.3rem;
            margin-bottom: 20px;
        }

        .description {
            color: blueviolet;
            max-width: 500px;
            margin: 0 auto 30px auto;
        }

        /* Button Styling */
        .contact-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            max-width: 300px;
            padding: 18px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-whatsapp { background-color: #25D366; }
        .btn-email { background-color: blueviolet; }

        /* Main Image */
        .product-img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(92, 46, 199, 0.3);
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <h1>CLASSIC CROCS</h1>

    <p class="price-tag">EACH PAIR IS GOING AT K160 FOR A PRE ORDER AND K280 AT RETAIL</p>
    
    <p class="description">
        Once you have chosen a pair, use the buttons below to reach the supplier directly.
    </p>

    <div class="contact-area">
        <a href="https://wa.me/qr/QQAG6XSQE3UVB1?text=Hello!%20I%20am%20interested%20in%20ordering%20a%20pair%20of%20Classic%20Crocs." 
           class="btn btn-whatsapp">
           WHATSAPP SUPPLIER
        </a>

        <a href="mailto:your@email.com?subject=Classic%20Crocs%20Order&body=Hello,%20I%20would%20like%20to%20order..." 
           class="btn btn-email">
           EMAIL SUPPLIER
        </a>
    </div>

    <img src="crocs.jpg" alt="Classic Crocs" class="product-img">

</body>
</html>
